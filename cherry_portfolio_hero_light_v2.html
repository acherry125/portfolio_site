<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,mx=0.5,my=0.5,tmx=0.5,tmy=0.5;
const particles=[];
const COUNT=160;

function resize(){
const r=canvas.parentElement.getBoundingClientRect();
const dpr=Math.min(window.devicePixelRatio||1,2);
W=r.width;H=r.height;
canvas.width=W*dpr;canvas.height=H*dpr;
ctx.scale(dpr,dpr);
}

class Particle{
constructor(){this.reset();}
reset(){
this.x=Math.random()*W;
this.y=Math.random()*H;
this.vx=(Math.random()-0.5)*0.25;
this.vy=(Math.random()-0.5)*0.25;
this.r=Math.random()*2.5+0.5;
this.alpha=Math.random()*0.35+0.05;
this.pulse=Math.random()*Math.PI*2;
this.speed=Math.random()*0.008+0.004;
this.hue=Math.random();
}
update(){
this.pulse+=this.speed;
const dx=tmx*W-this.x;
const dy=tmy*H-this.y;
const dist=Math.sqrt(dx*dx+dy*dy);
const force=Math.max(0,1-dist/300);
this.vx+=dx*force*0.00006;
this.vy+=dy*force*0.00006;
this.vx*=0.996;this.vy*=0.996;
this.x+=this.vx;this.y+=this.vy;
if(this.x<-10)this.x=W+10;
if(this.x>W+10)this.x=-10;
if(this.y<-10)this.y=H+10;
if(this.y>H+10)this.y=-10;
}
draw(){
const a=this.alpha*(0.5+0.5*Math.sin(this.pulse));
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
if(this.hue<0.5)ctx.fillStyle='rgba(192,57,43,'+a+')';
else if(this.hue<0.8)ctx.fillStyle='rgba(169,50,38,'+a*0.7+')';
else ctx.fillStyle='rgba(220,100,80,'+a*0.5+')';
ctx.fill();
}
}

function init(){
resize();
for(let i=0;i<COUNT;i++)particles.push(new Particle());
}

function drawConnections(){
for(let i=0;i<particles.length;i++){
for(let j=i+1;j<particles.length;j++){
const dx=particles[i].x-particles[j].x;
const dy=particles[i].y-particles[j].y;
const d=dx*dx+dy*dy;
if(d<7000){
const a=(1-d/7000)*0.04;
ctx.beginPath();
ctx.moveTo(particles[i].x,particles[i].y);
ctx.lineTo(particles[j].x,particles[j].y);
ctx.strokeStyle='rgba(192,57,43,'+a+')';
ctx.lineWidth=0.5;
ctx.stroke();
}
}
}
}

function loop(){
ctx.clearRect(0,0,W,H);
tmx+=(mx-tmx)*0.035;
tmy+=(my-tmy)*0.035;
drawConnections();
particles.forEach(p=>{p.update();p.draw();});
requestAnimationFrame(loop);
}

document.getElementById('hero').addEventListener('mousemove',e=>{
const r=e.currentTarget.getBoundingClientRect();
mx=(e.clientX-r.left)/r.width;
my=(e.clientY-r.top)/r.height;
});

init();loop();
window.addEventListener('resize',resize);
</script>
